name: Build And Release Debian Package

on:
  push:
    branches:
      - main
      - codex/dev-patch-fonts
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

concurrency:
  group: release-deb
  cancel-in-progress: false

jobs:
  prepare-release:
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    outputs:
      skip_build: ${{ steps.release_check.outputs.skip_build }}
      codex_app_version: ${{ steps.collect_metadata.outputs.codex_app_version }}
      codex_build_number: ${{ steps.collect_metadata.outputs.codex_build_number }}
      electron_version: ${{ steps.collect_metadata.outputs.electron_version }}
      release_tag: ${{ steps.collect_metadata.outputs.release_tag }}
      release_name: ${{ steps.collect_metadata.outputs.release_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install build dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ca-certificates \
            curl \
            g++-11 \
            gcc-11 \
            git \
            python3 \
            tar \
            unzip \
            xz-utils

      - name: Build Linux app from latest DMG
        env:
          npm_config_python: /usr/bin/python3
        run: |
          rm -f Codex.dmg
          chmod +x install.sh
          ./install.sh

      - name: Collect release metadata
        id: collect_metadata
        run: |
          meta_dir="$(mktemp -d)"
          (
            cd "$meta_dir"
            npx --yes asar extract-file "$GITHUB_WORKSPACE/codex-app/resources/app.asar" package.json
          )

          codex_app_version="$(node -p "require('$meta_dir/package.json').version")"
          codex_build_number="$(node -p "require('$meta_dir/package.json').codexBuildNumber || ''")"
          electron_version="$(tr -d '\n' < codex-app/version)"
          release_tag="codex-desktop-linux-v${codex_app_version}"
          release_name="Codex Desktop Linux ${codex_app_version} for Ubuntu 20.04/22.04/24.04"

          if [ -n "$codex_build_number" ]; then
            release_name="${release_name} (build ${codex_build_number}, Electron ${electron_version})"
          else
            release_name="${release_name} (Electron ${electron_version})"
          fi

          {
            echo "codex_app_version=$codex_app_version"
            echo "codex_build_number=$codex_build_number"
            echo "electron_version=$electron_version"
            echo "release_tag=$release_tag"
            echo "release_name=$release_name"
          } >> "$GITHUB_OUTPUT"

      - name: Skip scheduled rebuild when release exists
        id: release_check
        if: github.event_name == 'schedule'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.collect_metadata.outputs.release_tag }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          repo = os.environ["GITHUB_REPOSITORY"]
          tag = os.environ["RELEASE_TAG"]
          token = os.environ["GITHUB_TOKEN"]
          output_path = os.environ["GITHUB_OUTPUT"]

          request = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/releases/tags/{tag}",
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {token}",
              },
          )

          try:
              with urllib.request.urlopen(request) as response:
                  payload = json.load(response)
          except urllib.error.HTTPError as exc:
              if exc.code == 404:
                  print(f"No release found for {tag}; continuing build.")
                  with open(output_path, "a", encoding="utf-8") as handle:
                      handle.write("skip_build=false\n")
                  raise SystemExit(0)
              raise

          print(f"Release already exists for {tag}: {payload.get('html_url', 'unknown url')}")
          with open(output_path, "a", encoding="utf-8") as handle:
              handle.write("skip_build=true\n")
          PY

      - name: Generate release notes
        if: github.event_name != 'schedule' || steps.release_check.outputs.skip_build != 'true'
        env:
          CODEX_APP_VERSION: ${{ steps.collect_metadata.outputs.codex_app_version }}
          CODEX_BUILD_NUMBER: ${{ steps.collect_metadata.outputs.codex_build_number }}
          ELECTRON_VERSION: ${{ steps.collect_metadata.outputs.electron_version }}
          RELEASE_TAG: ${{ steps.collect_metadata.outputs.release_tag }}
        run: |
          previous_tag="$(git tag --list 'codex-desktop-linux-v*' --sort=-creatordate | grep -Fxv "$RELEASE_TAG" | head -n 1 || true)"

          if [ -n "$previous_tag" ]; then
            commit_list="$(git log --pretty=format:'- %h %s (%an)' "${previous_tag}..HEAD")"
          else
            commit_list="$(git log -n 20 --pretty=format:'- %h %s (%an)')"
          fi

          if [ -z "$commit_list" ]; then
            commit_list="- No recent commits found."
          fi

          {
            echo "# ${RELEASE_TAG}"
            echo
            echo "- Codex Desktop: ${CODEX_APP_VERSION}"
            if [ -n "$CODEX_BUILD_NUMBER" ]; then
              echo "- Build number: ${CODEX_BUILD_NUMBER}"
            fi
            echo "- Electron: ${ELECTRON_VERSION}"
            echo "- Artifacts: Ubuntu 20.04, Ubuntu 22.04, Ubuntu 24.04"
            echo
            if [ -n "$previous_tag" ]; then
              echo "## Commits since ${previous_tag}"
            else
              echo "## Recent commits"
            fi
            echo
            printf '%s\n' "$commit_list"
          } > release-notes.md

      - name: Upload release notes artifact
        if: github.event_name != 'schedule' || steps.release_check.outputs.skip_build != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release-notes.md

  build-release:
    needs: prepare-release
    if: github.event_name != 'schedule' || needs.prepare-release.outputs.skip_build != 'true'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        ubuntu_version:
          - "20.04"
          - "22.04"
          - "24.04"
    container:
      image: ubuntu:${{ matrix.ubuntu_version }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install build dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y software-properties-common
          add-apt-repository -y ppa:ubuntu-toolchain-r/test
          apt-get update
          apt-get install -y \
            build-essential \
            ca-certificates \
            curl \
            g++-11 \
            gcc-11 \
            git \
            python3 \
            tar \
            unzip \
            xz-utils

      - name: Build Linux app from latest DMG
        env:
          npm_config_python: /usr/bin/python3
        run: |
          rm -f Codex.dmg
          chmod +x install.sh
          ./install.sh

      - name: Build Debian package
        run: |
          chmod +x build-deb.sh
          ./build-deb.sh

      - name: Rename Debian package for release
        env:
          UBUNTU_VERSION: ${{ matrix.ubuntu_version }}
        run: |
          deb_source="$(find dist -maxdepth 1 -type f -name '*.deb' | head -n 1)"
          deb_basename="$(basename "$deb_source" .deb)"
          release_dir="dist/release"
          deb_release_path="${release_dir}/${deb_basename}_ubuntu${UBUNTU_VERSION}.deb"
          mkdir -p "$release_dir"
          cp "$deb_source" "$deb_release_path"
          echo "DEB_RELEASE_PATH=$deb_release_path" >> "$GITHUB_ENV"

      - name: Upload Debian artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-desktop-linux-${{ needs.prepare-release.outputs.codex_app_version }}-ubuntu${{ matrix.ubuntu_version }}-deb
          path: ${{ env.DEB_RELEASE_PATH }}

  publish-release:
    needs:
      - prepare-release
      - build-release
    if: github.event_name != 'schedule' || needs.prepare-release.outputs.skip_build != 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Download Debian artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: codex-desktop-linux-*-deb
          merge-multiple: true

      - name: Download release notes artifact
        uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: release-notes

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.release_tag }}
          name: ${{ needs.prepare-release.outputs.release_name }}
          body_path: release-notes/release-notes.md
          files: release-assets/*
          overwrite_files: true
